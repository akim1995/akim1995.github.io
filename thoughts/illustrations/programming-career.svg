<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 180" width="150" height="180">
  <defs>
    <pattern id="p1" patternUnits="userSpaceOnUse" width="8" height="5">
      <line x1="0" y1="2.5" x2="8" y2="2.5" stroke="#1a1a1a" stroke-width="0.75"/>
    </pattern>
    <pattern id="p2" patternUnits="userSpaceOnUse" width="6" height="6">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#1a1a1a" stroke-width="0.75"/>
    </pattern>
    <pattern id="p3" patternUnits="userSpaceOnUse" width="6" height="6">
      <line x1="0" y1="0" x2="6" y2="6" stroke="#1a1a1a" stroke-width="0.6"/>
      <line x1="6" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.6"/>
    </pattern>
    <pattern id="p4" patternUnits="userSpaceOnUse" width="5" height="7">
      <line x1="2.5" y1="0" x2="2.5" y2="7" stroke="#1a1a1a" stroke-width="0.75"/>
    </pattern>
    <pattern id="p5" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="4" stroke="#1a1a1a" stroke-width="0.55"/>
      <line x1="4" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.55"/>
      <line x1="0" y1="2" x2="4" y2="2" stroke="#1a1a1a" stroke-width="0.4"/>
    </pattern>
    <clipPath id="cl">
      <polygon points="0,0 88,0 78,180 0,180"/>
    </clipPath>
    <clipPath id="cr">
      <polygon points="88,0 150,0 150,180 78,180"/>
    </clipPath>
  </defs>

  <!-- Left side of fault -->
  <g clip-path="url(#cl)">
    <rect x="0" y="0"   width="150" height="36" fill="url(#p1)"/>
    <rect x="0" y="36"  width="150" height="36" fill="url(#p2)"/>
    <rect x="0" y="72"  width="150" height="36" fill="url(#p3)"/>
    <rect x="0" y="108" width="150" height="36" fill="url(#p4)"/>
    <rect x="0" y="144" width="150" height="36" fill="url(#p5)"/>
    <line x1="0" y1="36"  x2="150" y2="36"  stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="0" y1="72"  x2="150" y2="72"  stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="0" y1="108" x2="150" y2="108" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="0" y1="144" x2="150" y2="144" stroke="#1a1a1a" stroke-width="1.2"/>
  </g>

  <!-- Right side of fault (shifted down 20px) -->
  <g clip-path="url(#cr)">
    <rect x="0" y="-20" width="150" height="36" fill="url(#p1)"/>
    <rect x="0" y="16"  width="150" height="36" fill="url(#p2)"/>
    <rect x="0" y="52"  width="150" height="36" fill="url(#p3)"/>
    <rect x="0" y="88"  width="150" height="36" fill="url(#p4)"/>
    <rect x="0" y="124" width="150" height="36" fill="url(#p5)"/>
    <line x1="0" y1="16"  x2="150" y2="16"  stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="0" y1="52"  x2="150" y2="52"  stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="0" y1="88"  x2="150" y2="88"  stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="0" y1="124" x2="150" y2="124" stroke="#1a1a1a" stroke-width="1.2"/>
  </g>

  <!-- Fault line -->
  <line x1="88" y1="0" x2="78" y2="180" stroke="#1a1a1a" stroke-width="2"/>
</svg>
